<!-- ============ CONTACT ============ -->
<section class="contact section contact--page" id="main" tabindex="-1">
  <div class="topo contact__topo" aria-hidden="true"></div>
  <div class="wrap">
    <span class="label reveal">Contact</span>
    <h1 class="reveal">Let&#x2019;s work together.</h1>
    <div class="contact__links reveal">
      <a href="https://linkedin.com/in/arnan-m-999ab5165" target="_blank" rel="noopener">LinkedIn ↗</a>
      <a href="https://public.tableau.com/app/profile/arnan.muflihadi" target="_blank" rel="noopener">Tableau ↗</a>
      <a href="mailto:arnanmuflihadi@gmail.com">Email ↗</a>
    </div>
    <!-- EDIT: create a free form at formspree.io and replace YOUR_FORM_ID below -->
    <form class="contact__form reveal" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" data-contact-form>
      <div class="field">
        <label for="contact-name">Your name <span class="req" aria-hidden="true">*</span></label>
        <input type="text" id="contact-name" name="name" placeholder="Jane Doe" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="contact-email">Your email <span class="req" aria-hidden="true">*</span></label>
        <input type="email" id="contact-email" name="email" placeholder="jane@email.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="contact-message">Your message <span class="req" aria-hidden="true">*</span></label>
        <textarea id="contact-message" name="message" rows="4" placeholder="How can I help?" required></textarea>
      </div>
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" style="display:none">
      <button type="submit" class="btn contact__submit">Send message <span class="arrow">→</span></button>
      <p class="contact__status" data-contact-status role="status" aria-live="polite"></p>
    </form>
  </div>
</section>
